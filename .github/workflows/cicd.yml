name: YouTube Sentiment CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Set up Python 3.11 environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip' # cache pip dependencies to speed up future runs

    # 3. Install required packages
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Verify Model loading and inference
    # This runs the model_predictor.py main check. If the model pickle is corrupt or imports are broken, the build will fail.
    - name: Sanity Check Model Predictor
      env:
        YT_API_KEY: ${{ secrets.YT_API_KEY }}
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python src/components/model_predictor.py

    # 5. Continuous Deployment (Vercel)
    # Note: Vercel automatically deploys your project on Git Push. 
    # This step reports the status and ensures everything is tested before Vercel goes live.
    - name: CI Verification Success
      run: echo "Code validation succeeded! Vercel is safe to deploy."
